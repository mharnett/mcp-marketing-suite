name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: shellcheck
        run: shellcheck setup.sh

      - name: setup.sh integration tests
        run: bash tests/test-setup.sh

      - name: Package registry health check
        run: node tests/check-packages.js
